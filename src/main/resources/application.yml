# =====================================================
# application.yml - SERVICE NOTIFICATION (WebFlux)
# =====================================================

server:
  port: 8081

spring:
  application:
    name: notifications

  # =====================================================
  # CASSANDRA
  # =====================================================
  cassandra:
    contact-points: localhost   # En prod : adresse du cluster Cassandra de l'infra
    port: 9042
    keyspace-name: sih_notifications
    local-datacenter: datacenter1
    # CREATE_IF_NOT_EXISTS en dev — NONE en prod (migrations manuelles via schema.cql)
    schema-action: CREATE_IF_NOT_EXISTS

  # =====================================================
  # RABBITMQ
  # =====================================================
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        concurrency: 5

# =====================================================
# LOGGING
# =====================================================
logging:
  level:
    com.enova.notifications: DEBUG
    org.springframework.data.cassandra: INFO
    org.springframework.amqp: INFO
    org.springframework.web.reactive: INFO
    reactor: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file:    "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/notifications.log
    max-size: 10MB
    max-history: 10
